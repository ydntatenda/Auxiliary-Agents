services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: agentic_ops
      POSTGRES_PASSWORD: agentic_ops
      POSTGRES_DB: agentic_ops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic_ops"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://agentic_ops:agentic_ops@postgres:5432/agentic_ops
      FRONTEND_ORIGIN: http://localhost:5173
      UPLOAD_DIR: /app/uploads
    env_file:
      - ./backend/.env.local
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:

